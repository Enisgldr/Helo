<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heloma özel</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        
        body {
            background: #d1d1d1;
            font-family: 'Permanent Marker', cursive;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Kağıt Katmanı */
        #paper {
            position: relative;
            width: 98vw;
            height: 95vh;
            background: #fff;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
            cursor: url('https://cdn-icons-png.flaticon.com/32/589/589708.png'), crosshair;
        }

        /* Defter Kareleri */
        #paper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* ANA GÜNEŞ (SAĞ ÜST) */
        #main-sun-container {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 100;
            text-align: center;
            cursor: pointer;
        }

        .sun-body {
            width: 80px;
            height: 80px;
            background: #ffce00;
            border-radius: 50%;
            box-shadow: 0 0 20px #ffce00;
            border: 3px solid #f39c12;
            margin: 0 auto;
            transition: transform 0.3s;
        }

        .sun-body:hover { transform: scale(1.1) rotate(15deg); }

        #sun-label {
            margin-top: 10px;
            font-size: 22px;
            color: #e67e22;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* GİZLİ MİNİ GÜNEŞ (SOL ALT KENAR) */
        #secret-mini-sun {
            position: absolute;
            bottom: 5px;
            left: 5px;
            width: 15px;
            height: 15px;
            background: #fdfdfd; /* Kağıt rengine çok yakın */
            border: 1px solid #eee;
            border-radius: 50%;
            z-index: 200;
            cursor: help;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s;
        }

        #secret-mini-sun:hover, #secret-mini-sun.active {
            background: #ffeb3b;
            width: 30px;
            height: 30px;
            border-color: #f1c40f;
            box-shadow: 0 0 10px #ffeb3b;
        }

        #secret-h {
            font-family: sans-serif;
            font-weight: 900;
            font-size: 14px;
            color: #fff;
            display: none;
        }

        #secret-mini-sun:hover #secret-h, #secret-mini-sun.active #secret-h {
            display: block;
        }

        /* ARAÇLAR */
        .toolbar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .color-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #clear-btn {
            padding: 8px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: sans-serif;
            cursor: pointer;
            font-weight: bold;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; }
    </style>
</head>
<body>

<div id="paper">
    <canvas id="canvas"></canvas>

    <div id="main-sun-container" onclick="toggleLabel()">
        <div class="sun-body"></div>
        <div id="sun-label">Enis'in güneşi</div>
    </div>

    <div id="secret-mini-sun" onclick="this.classList.toggle('active')">
        <span id="secret-h">H</span>
    </div>

    <div class="toolbar">
        <div class="color-circle" style="background: #2c3e50;" onclick="setColor('#2c3e50')"></div>
        <div class="color-circle" style="background: #e74c3c;" onclick="setColor('#e74c3c')"></div>
        <div class="color-circle" style="background: #3498db;" onclick="setColor('#3498db')"></div>
        <div class="color-circle" style="background: #27ae60;" onclick="setColor('#27ae60')"></div>
        <button id="clear-btn" onclick="clearCanvas()">SİL</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const paper = document.getElementById('paper');
    const label = document.getElementById('sun-label');
    
    let drawing = false;
    let currentColor = '#2c3e50';

    function resize() {
        canvas.width = paper.offsetWidth;
        canvas.height = paper.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function setColor(color) {
        currentColor = color;
    }

    function start(e) {
        drawing = true;
        draw(e);
    }

    function end() {
        drawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!drawing) return;

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = currentColor;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function toggleLabel() {
        label.style.opacity = (label.style.opacity == "1") ? "0" : "1";
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        label.style.opacity = "0";
    }

    // Event Dinleyiciler
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mousemove', draw);

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
    canvas.addEventListener('touchend', end);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

</script>

</body>
</html>
</html>
