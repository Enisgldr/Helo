<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Helom</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        /* Kaydırmayı tamamen kapat */
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        
        body {
            background: #d1d1d1;
            font-family: 'Permanent Marker', cursive;
            /* lvh ve dvh mobil tarayıcı çubuklarını hesaba katar */
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed; /* Ekranın oynamasını engeller */
        }

        #paper {
            position: relative;
            /* Ekranın %96'sını kullan, taşma yapma */
            width: 96vw;
            height: 94dvh;
            background: #fff;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
            overflow: hidden;
            border-radius: 8px;
        }

        /* Çizgiler */
        #paper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 25px 25px;
            pointer-events: none;
        }

        /* Sağ Üst Güneş */
        #main-sun-container {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
            text-align: center;
        }

        .sun-body {
            width: 60px; /* Mobilde biraz küçülttük */
            height: 60px;
            background: #ffce00;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffce00;
            border: 2px solid #f39c12;
        }

        #sun-label {
            margin-top: 5px;
            font-size: 16px;
            color: #e67e22;
            opacity: 0;
            white-space: nowrap;
        }

        /* Gizli H (Sol Alt) */
        #secret-mini-sun {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1); /* Başta neredeyse görünmez */
            border-radius: 50%;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #secret-mini-sun.active {
            background: #ffeb3b;
            width: 40px;
            height: 40px;
            box-shadow: 0 0 15px #ffeb3b;
        }

        #secret-h {
            color: #fff;
            font-weight: 900;
            display: none;
        }

        #secret-mini-sun.active #secret-h { display: block; }

        /* Araçlar - Mobilde daha rahat basılması için büyüttük */
        .toolbar {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .color-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #clear-btn {
            padding: 0 15px;
            height: 35px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="paper">
    <canvas id="canvas"></canvas>

    <div id="main-sun-container" onclick="toggleLabel()">
        <div class="sun-body"></div>
        <div id="sun-label">Enis'in güneşi</div>
    </div>

    <div id="secret-mini-sun" onclick="this.classList.toggle('active')">
        <span id="secret-h">H</span>
    </div>

    <div class="toolbar">
        <div class="color-circle" style="background: #2c3e50;" onclick="setColor('#2c3e50')"></div>
        <div class="color-circle" style="background: #e74c3c;" onclick="setColor('#e74c3c')"></div>
        <div class="color-circle" style="background: #3498db;" onclick="setColor('#3498db')"></div>
        <button id="clear-btn" onclick="clearCanvas()">TEMİZLE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const paper = document.getElementById('paper');
    const label = document.getElementById('sun-label');
    
    let drawing = false;
    let currentColor = '#2c3e50';

    function init() {
        // Canvas'ın gerçek piksel boyutunu ayarla
        canvas.width = paper.clientWidth;
        canvas.height = paper.clientHeight;
    }

    window.addEventListener('resize', init);
    init();

    function setColor(color) { currentColor = color; }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function start(e) {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = currentColor;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function end() { drawing = false; }

    function toggleLabel() { label.style.opacity = (label.style.opacity == "1") ? "0" : "1"; }
    function clearCanvas() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        label.style.opacity = "0";
    }

    // Fare Olayları
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', end);

    // Dokunmatik Olaylar
    canvas.addEventListener('touchstart', (e) => { start(e); });
    canvas.addEventListener('touchmove', (e) => { draw(e); });
    canvas.addEventListener('touchend', end);
</script>

</body>
</html>
