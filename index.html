<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heloma Özel</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #a8c0ff, #fbc2eb);
    font-family: Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
}

#container {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 100%;
}

h1 {
    font-size: 32px;
    color: white;
    animation: float 3s ease-in-out infinite;
    padding: 0 20px;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    position: absolute;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
}

#yesBtn {
    left: 30%;
    top: 60%;
    background: #4dabf7;
    color: white;
}

#noBtn {
    left: 60%;
    top: 60%;
    background: #495057;
    color: white;
}

#message {
    position: absolute;
    top: 45%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: white;
    display: none;
}

.heart {
    position: absolute;
    font-size: 22px;
    pointer-events: none;
    animation: floatUp 4s linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity:1; }
    to { transform: translateY(-10vh); opacity:0; }
}

.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="container">
    <h1>Barışalım mı Artık? 😇</h1>
</div>

<div id="message">Helom... Nice Mutlu Kavgalarımıza...😉</div>

<button id="yesBtn">EVET EVETTT</button>
<button id="noBtn">HAYIR</button>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" preload="auto"></audio>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");
    const music = document.getElementById("music");

    let noScale = 1;

    // MOBİL + PC TEK EVENT (EN SAĞLAM YÖNTEM)
    noBtn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        moveNo();
    });

    noBtn.addEventListener("mouseover", moveNo);

    function moveNo() {
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        const x = Math.max(10, Math.random() * maxX);
        const y = Math.max(10, Math.random() * maxY);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        noScale -= 0.08;
        if (noScale < 0.3) noScale = 0.3;
        noBtn.style.transform = `scale(${noScale})`;
    }

    yesBtn.addEventListener("click", () => {
        message.style.display = "block";

        music.play().catch(() => {});

        document.getElementById("container").style.display = "none";
        noBtn.style.display = "none";
        yesBtn.style.display = "none";

        startHearts();
        startConfetti();
    });

    function startHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = Math.random() > 0.5 ? "💙" : "💛";
            heart.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }, 200);
    }

    function startConfetti() {
        setInterval(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.top = "-10px";
            confetti.style.background = ["#4dabf7","#ffd43b","#74c0fc","#fab005"][Math.floor(Math.random()*4)];
            document.body.appendChild(confetti);

            let top = -10;
            let fall = setInterval(() => {
                top += 3;
                confetti.style.top = top + "px";
                if (top > window.innerHeight) {
                    clearInterval(fall);
                    confetti.remove();
                }
            }, 10);
        }, 150);
    }

});
</script>

</body>
</html>
